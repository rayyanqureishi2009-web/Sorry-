<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ambar ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #FFD1DC; /* Baby Pink */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #4A4A4A;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100vh;
            padding: 20px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .active {
            display: flex;
        }

        h1 {
            font-size: 3rem;
            color: #D14D72;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Buttons Styling */
        .btn {
            background-color: #FF8E9E;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 142, 158, 0.4);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #F87487;
            transform: translateY(-2px);
        }

        /* Page 2: Envelope */
        .envelope-container {
            position: relative;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .envelope {
            font-size: 8rem;
            transition: transform 0.3s ease;
        }

        .envelope-container:hover .envelope {
            transform: scale(1.1);
        }

        .letter {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            margin-top: 20px;
            font-weight: 500;
            color: #555;
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .arrow-btn {
            font-size: 2.5rem;
            color: #D14D72;
            background: none;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            display: none;
            animation: bounce 2s infinite;
        }

        /* Page 3: Forgiveness Options */
        .btn-group {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 150px;
            margin-top: 20px;
        }

        #noBtn {
            position: absolute;
            transition: all 0.1s ease;
            white-space: nowrap;
        }

        #yesBtn {
            position: absolute;
            left: 20%;
            top: 0;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(0); }
            40% { transform: translateX(-10px); }
            60% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <h1>SORRY AMBAR</h1>
        <button class="btn" onclick="nextPage(2)">Tap to continue</button>
    </div>

    <div id="page2" class="page">
        <div class="envelope-container" onclick="openEnvelope()">
            <div class="envelope" id="envIcon">✉️</div>
            <div class="letter" id="letterText">
                It's all started with misunderstanding and don't wanna hurt you ❤️‍🩹
            </div>
        </div>
        <button class="arrow-btn" id="arrowBtn" onclick="nextPage(3)">➔</button>
    </div>

    <div id="page3" class="page">
        <h1>Kiya Apne maaf kr diyaaaa?</h1>
        <div class="btn-group">
            <button class="btn" id="yesBtn" onclick="forgiven()">Yes</button>
            <button class="btn" id="noBtn" onclick="moveNoButton()" onmouseover="moveNoButton()">No</button>
        </div>
    </div>

    <div id="page4" class="page">
        <h1 style="font-size: 2.5rem;">Sorry ke mene pehle nhi soocha thaaa and tujhe iska moka bhi diya to ainda nhi hogaaa aur maaf krne ke liye thankooooooo 💕</h1>
    </div>

    <script>
        // Page Navigation Function
        function nextPage(pageNum) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById('page' + pageNum).classList.add('active');
        }

        // Open Envelope Function
        function openEnvelope() {
            document.getElementById('envIcon').innerHTML = "📂";
            document.getElementById('letterText').style.display = "block";
            document.getElementById('arrowBtn').style.display = "block";
        }

        // No Button Messages Array
        const noMessages = [
            "Try harder 🥺",
            "Man jao naaa Please...",
            "Aise mat karo na 💔",
            "Ek baar aur socho 🤔",
            "Plss maaf krdo! 🙏",
            "Nhi dabane dunga 'No' 😜"
        ];
        let messageIndex = 0;

        // Move "No" Button and Change Text
        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Change text inside button
            noBtn.innerText = noMessages[messageIndex];
            messageIndex = (messageIndex + 1) % noMessages.length;

            // Generate random position inside viewport
            // Leaving padding so it doesn't go off screen
            const padding = 100;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            // Apply fixed position to teleport it anywhere on screen
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Final Forgiveness Page
        function forgiven() {
            nextPage(4);
        }
    </script>
</body>
</html>
